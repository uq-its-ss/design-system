<style>
  .uq-header {
    background: #51247a;
    display: grid;
    align-items: center;
    grid-template-columns: auto;
    grid-template-areas: "mainheader" "secondarynav";
    position: relative

  @media(min-width: 64rem) {
    .uq-header {
      grid-template-areas: "secondarynav" "mainheader"

  }

  .uq-header__container {
    display: grid;
    align-items: center;
    grid-template-columns: 1fr 15fr 1fr;
    grid-area: mainheader;
    grid-template-areas: "menutoggle logo searchtoggle" "mainnav-mobile mainnav-mobile mainnav-mobile"
  }

  @media(min-width: 64rem) {
    .uq-header__container {
      max-width: 73.25rem;
      margin-left: auto;
      margin-right: auto;
      grid-template-areas: "logo mainnav searchtoggle";
      padding-left: 1rem;
      padding-right: 1rem
    }

  /* Toggle menu */
  .uq-header__menu-toggle {
    grid-area: menutoggle
  }

  @media(min-width: 64rem) {
    .uq-header__menu-toggle {
      display: none
    }
  }
 
  /* Toggle search */
  .uq-header__search-toggle {
    grid-area: searchtoggle;
    height: 100%;
    text-align: right;
    color: #fff
  }

  @media(min-width: 64rem) {
    .uq-header__search-toggle {
      height: auto

  }

  :root {
    --app-height: 100%
  }

  body.no-scroll {
    position: fixed;
    max-width: 100%
  }

  @media(min-width: 64rem) {
    body.no-scroll {
      position: relative
    }
  }

  .slide-menu {
    width: 100%;
    max-width: 100%;
    background-color: #fff;
    height: calc(var(--app-height) - 4.3rem);
    display: none;
    box-sizing: border-box;
    transition: transform .3s ease-in-out;
    transform: translateX(100%);
    will-change: transform;
    z-index: 1000;
    grid-area: mainnav-mobile;
    position: fixed;
    top: 4.3rem;
    right: 0;
    overflow-y: auto;
    overflow-x: hidden;
    font-size: 1rem;
    color: #51247a
  }

  @media(min-width: 64rem) {
    .slide-menu {
      display: none !important
    }
  }

  .slide-menu .slide-menu__slider {
    width: 100%;
    transform: translateX(0);
    transition: transform .3s ease-in-out;
    will-change: transform
  }

  .slide-menu ul {
    position: relative;
    width: 100%;
    margin: 0;
    padding-left: 0;
    list-style: none;
    background-color: #fff
  }

  .slide-menu ul ul {
    position: absolute;
    top: 0;
    left: 100%;
    display: none
  }

  .slide-menu ul ul a {
    padding: .75rem 1.5rem .75rem 3rem
  }

  .slide-menu ul a {
    display: block
  }

  .slide-menu li {
    margin-bottom: 0
  }

  .slide-menu li:hover {
    background-color: #f1f1f1
  }

  .slide-menu .slide-menu__control {
    padding-top: 1rem;
    padding-bottom: 1rem;
    font-weight: 500
  }

  .slide-menu a {
    cursor: pointer;
    padding: .75rem 1.5rem;
    text-decoration: none;
    font-size: 1rem;
    color: #51247a;
    position: relative;
    font-weight: 400
  }

  .slide-menu a:hover {
    color: #51247a;
    background-color: #f1f1f1
  }

  .slide-menu .slide-menu__backlink {
    font-weight: 500;
    padding-left: 3rem
  }

  .slide-menu .slide-menu__backlink::before {
    content: "";
    background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='m14 7-5 5 5 5' stroke='%2351247a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3e%3c/path%3e%3c/svg%3e");
    background-repeat: no-repeat;
    width: 1.5rem;
    height: 1.5rem;
    transform: translateY(50%);
    position: absolute;
    left: 1.25rem;
    top: .25rem
  }

  .slide-menu__decorator::before {
    content: "";
    background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='m10 17 5-5-5-5' stroke='%2351247a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'%3e%3c/path%3e%3c/svg%3e");
    background-repeat: no-repeat;
    width: 1.5rem;
    height: 1.5rem;
    transform: translateY(50%);
    position: absolute;
    right: 1.5rem;
    top: .25rem
  }

  .slide-menu .controls {
    display: flex;
    margin-bottom: 1rem
  }

  .slide-menu .btn {
    padding: .75rem 1.5rem;
    flex: 1 0 auto;
    font-size: 90%;
    color: #51247a;
    background-color: #fff;
    text-transform: uppercase;

  }

  .slide-menu .btn:last-of-type {
    text-align: right
  }

  .slide-menu .btn:last-of-type:before {

    margin-right: .5rem

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const menuLeftElem = document.getElementById('global-mobile-nav');

    const menuLeft = new SlideMenu(menuLeftElem, {
      position: 'left',
      submenuLinkAfter: ' ',
      backLinkBefore: ' ',
    });

    this.searchToggle = document.querySelector('.nav-primary__search-toggle');

    this.searchToggle.addEventListener('click', () => {
      menuLeft.close();
    });


    var slideMenuBackButtons = document.querySelectorAll('.slide-menu__backlink, .global-mobile-nav__audience-link');

    Array.prototype.forEach.call(slideMenuBackButtons, function (el, i) {
      el.addEventListener('click', () => {
        document.querySelector('.global-mobile-nav').scrollTop = 0;
      });
    });

    // Responsive Resize Close menu and update toggles 
    window.addEventListener('resize', (event) => {

      // Target Resize of LG ($screen-lg, 64rem, 1024px). 
      if (window.innerWidth > 1024) {
        menuLeft.close(true);
        //reset the menu toggle after closing. 
        this.mainNavToggle = document.querySelector('.nav-primary__toggle');
        this.mainNavToggle.classList.remove('nav-primary__menu-toggle--is-open');
        this.body = document.querySelector('body');
        this.body.classList.remove('no-scroll');
      }
    });
  });

</script>
